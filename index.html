<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
  (function() {
    const saved = localStorage.getItem('attendance-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eye — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
[data-theme="dark"] {
  --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
  --text: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
  --primary: #4f46e5; --primary-light: #818cf8;
  --success: #22c55e; --danger: #ef4444;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
}
[data-theme="light"] {
  --bg: #f1f5f9; --bg-card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --primary: #4f46e5; --primary-light: #6366f1;
  --success: #16a34a; --danger: #dc2626;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.4s ease;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 36px 36px;
  width: 90%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  animation: fadeInUp 0.5s ease-out;
}
.login-header { text-align: center; margin-bottom: 32px; }
.login-header .icon {
  width: 56px; height: 56px;
  background: var(--gradient);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  font-size: 1.5rem; color: white;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.login-header h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.3px; }
.login-header p { font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px; }
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-secondary); margin-bottom: 6px;
}
.input-wrap {
  position: relative;
}
.input-wrap input {
  width: 100%; padding: 12px 14px;
  border-radius: 10px; border: 2px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.25s ease, box-shadow 0.25s ease;
  padding-right: 42px;
}
.input-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}
.input-wrap .toggle-pw {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px;
  transition: color 0.2s;
}
.input-wrap .toggle-pw:hover { color: var(--text-secondary); }
.helper {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin: -8px 0 20px;
  line-height: 1.4;
}
.btn {
  width: 100%; padding: 13px;
  border: none; border-radius: 10px;
  background: var(--gradient); color: white;
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 700; cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.btn:hover { box-shadow: 0 6px 18px rgba(79,70,229,0.45); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.8rem;
  font-weight: 500;
  margin-top: 16px;
  display: none;
  animation: fadeIn 0.3s ease-out;
}
.error-msg.show { display: block; }
.footer-link {
  text-align: center; margin-top: 22px;
  font-size: 0.8rem; color: var(--text-muted);
}
.footer-link a { color: var(--primary-light); text-decoration: none; font-weight: 600; }
.footer-link a:hover { text-decoration: underline; }
.theme-toggle {
  position: fixed; top: 20px; right: 20px;
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
  z-index: 10;
}
.theme-toggle:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: rotate(20deg);
}
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 480px) { .login-card { padding: 32px 20px 28px; } }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
  <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="login-card">
  <div class="login-header">
    <div class="icon"><i class="fas fa-eye"></i></div>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="fullId">Full ID</label>
      <div class="input-wrap">
        <input type="text" id="fullId" placeholder="e.g. HARV-T001" autocomplete="username" required>
      </div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" tabindex="-1" aria-label="Toggle password visibility">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <p class="helper">Your Full ID was provided by your school administrator</p>

    <div class="error-msg" id="loginError"></div>

    <button type="submit" class="btn" id="loginBtn">
      Sign In
    </button>
  </form>

  <div class="footer-link">
    Are you a school? <a href="./register.html">Register here</a>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('themeIcon');
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('attendance-theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('attendance-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
})();

// Show/hide password toggle
const pwInput = document.getElementById('password');
const toggleBtn = document.getElementById('togglePw');
toggleBtn.addEventListener('click', function() {
  const isPassword = pwInput.type === 'password';
  pwInput.type = isPassword ? 'text' : 'password';
  this.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
});

// Enter key triggers submit
document.getElementById('fullId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const fullId = document.getElementById('fullId').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errorEl.classList.remove('show');
  errorEl.textContent = '';

  // Client-side validation
  if (!fullId) {
    errorEl.textContent = 'Please enter your Full ID';
    errorEl.classList.add('show');
    return;
  }
  if (fullId.indexOf('-') === -1) {
    errorEl.textContent = 'Invalid ID format. Your ID should look like HARV-T001';
    errorEl.classList.add('show');
    return;
  }
  if (!password) {
    errorEl.textContent = 'Please enter your password';
    errorEl.classList.add('show');
    return;
  }

  const lastDashIndex = fullId.lastIndexOf('-');
  const tenant_id = fullId.substring(0, lastDashIndex).toUpperCase();
  const login_id = fullId.substring(lastDashIndex + 1);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tenant_id, login_id, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || 'Login failed. Please try again.';
      errorEl.classList.add('show');
      document.getElementById('password').value = '';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    if (data.is_first_login) {
      window.location.href = '/change-password.html';
    } else {
      window.location.href = data.redirect_url || '/';
    }
  } catch (err) {
    errorEl.textContent = 'Connection error. Please check your internet and try again.';
    errorEl.classList.add('show');
    document.getElementById('password').value = '';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>

</body>
</html>
