<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    /* Smooth button transitions */
    .att-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Present button active state */
    .att-btn.present-active {
      background-color: #059669 !important;
      color: white !important;
      border-color: #059669 !important;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.25);
      transform: scale(1.03);
    }

    /* Absent button active state */
    .att-btn.absent-active {
      background-color: #dc2626 !important;
      color: white !important;
      border-color: #dc2626 !important;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25);
      transform: scale(1.03);
    }

    /* Unmarked row highlight (validation) */
    .row-unmarked {
      animation: pulse-warn 0.6s ease-in-out 3;
    }

    @keyframes pulse-warn {

      0%,
      100% {
        background-color: transparent;
      }

      50% {
        background-color: #fef3c7;
      }
    }

    /* Row marked indicator */
    .row-marked-present {
      border-left: 4px solid #059669;
    }

    .row-marked-absent {
      border-left: 4px solid #dc2626;
    }

    .row-default {
      border-left: 4px solid transparent;
    }

    /* Toast notification */
    .toast {
      animation: slideUp 0.4s ease-out, fadeOut 0.4s ease-in 2.6s forwards;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    /* Progress bar fill */
    .progress-fill {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Hover effects for desktop */
    @media (hover: hover) {
      .att-btn:not(.present-active):not(.absent-active):hover {
        transform: scale(1.05);
      }
    }

    /* Summary cards entrance */
    .summary-card {
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Floating submit button pulse when all marked */
    .submit-ready {
      animation: submitPulse 2s ease-in-out infinite;
    }

    @keyframes submitPulse {

      0%,
      100% {
        box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
      }

      50% {
        box-shadow: 0 10px 35px -5px rgba(59, 130, 246, 0.5);
      }
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- ======================== HEADER ======================== -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-4 sm:py-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl sm:text-2xl font-800 text-gray-900 tracking-tight flex items-center gap-2">
            <span class="text-2xl sm:text-3xl">📋</span>
            Attendance
          </h1>
          <p class="text-xs sm:text-sm text-gray-500 mt-0.5" id="dateDisplay"></p>
        </div>
        <div class="text-right">
          <div class="text-xs text-gray-400 uppercase tracking-wider font-600 mb-1">Progress</div>
          <div id="progressText" class="text-sm font-700 text-gray-700">0 / 0</div>
        </div>
      </div>
      <!-- Progress Bar -->
      <div class="mt-3 h-2 bg-gray-100 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-fill h-full bg-gradient-to-r from-emerald-400 to-emerald-600 rounded-full"
          style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- ======================== MAIN ======================== -->
  <main class="max-w-2xl mx-auto px-4 py-5 sm:py-8 pb-24">

    <!-- Summary Cards -->
    <div class="grid grid-cols-3 gap-3 mb-6" id="summaryCards">
      <div class="summary-card bg-white rounded-xl p-3 sm:p-4 text-center border border-gray-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-gray-800" id="countTotal">0</div>
        <div class="text-xs text-gray-400 font-600 uppercase tracking-wider mt-1">Total</div>
      </div>
      <div class="summary-card bg-emerald-50 rounded-xl p-3 sm:p-4 text-center border border-emerald-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-emerald-600" id="countPresent">0</div>
        <div class="text-xs text-emerald-500 font-600 uppercase tracking-wider mt-1">Present</div>
      </div>
      <div class="summary-card bg-red-50 rounded-xl p-3 sm:p-4 text-center border border-red-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-red-500" id="countAbsent">0</div>
        <div class="text-xs text-red-400 font-600 uppercase tracking-wider mt-1">Absent</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="flex gap-2 mb-5">
      <button onclick="markAllPresent()"
        class="flex-1 text-xs sm:text-sm font-600 py-2.5 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 transition-colors cursor-pointer">
        ✅ Mark All Present
      </button>
      <button onclick="markAllAbsent()"
        class="flex-1 text-xs sm:text-sm font-600 py-2.5 rounded-lg bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 transition-colors cursor-pointer">
        ❌ Mark All Absent
      </button>
      <button onclick="resetAll()"
        class="text-xs sm:text-sm font-600 py-2.5 px-4 rounded-lg bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100 transition-colors cursor-pointer">
        ↺ Reset
      </button>
    </div>

    <!-- Student List -->
    <section aria-label="Student attendance list">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-100"
        id="studentList">
        <!-- Student rows rendered by JS -->
      </div>
    </section>

    <!-- ======================== SAVED RECORDS VIEWER ======================== -->
    <section class="mt-6 mb-8" aria-label="Saved attendance records">
      <button onclick="toggleSavedRecords()"
        class="w-full py-3 px-4 rounded-xl border-2 border-dashed border-gray-300 text-gray-500 font-600 text-sm
               hover:border-blue-400 hover:text-blue-600 transition-all cursor-pointer flex items-center justify-center gap-2 bg-white/50"
        id="toggleSavedBtn">
        <span>📋</span>
        <span>View Saved Records</span>
        <span id="savedToggleArrow" class="text-xs transition-transform duration-300">▼</span>
      </button>

      <div id="savedRecordsPanel"
        class="hidden mt-3 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-700 text-gray-800 text-sm flex items-center gap-2">
            <span>💾</span> Stored on this device
          </h3>
          <button onclick="clearSavedRecords()"
            class="text-xs px-3 py-1.5 rounded-lg bg-red-50 text-red-600 font-600 hover:bg-red-100 transition-colors cursor-pointer">
            🗑️ Clear Data
          </button>
        </div>
        <div id="savedRecordsContent" class="p-4">
          <!-- Records rendered by JS -->
        </div>
        <div class="px-4 pb-3">
          <p class="text-[11px] text-gray-400 flex items-center gap-1">
            <span>ℹ️</span> Data is stored in your browser's localStorage. It stays on this device only, in this
            browser.
          </p>
        </div>
      </div>
    </section>

  </main>

  <!-- ======================== FLOATING SUBMIT BUTTON (bottom-right) ======================== -->
  <button id="submitBtn" onclick="submitAttendance()" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-30
           py-3.5 px-6 sm:px-8 rounded-2xl font-700 text-sm sm:text-base transition-all cursor-pointer
           bg-gradient-to-r from-blue-600 to-indigo-600 text-white
           hover:from-blue-700 hover:to-indigo-700
           active:scale-[0.95] shadow-xl shadow-blue-500/30
           flex items-center gap-2" aria-label="Submit Attendance">
    <span>Submit</span>
    <span class="text-lg">→</span>
  </button>

  <!-- Toast container -->
  <div id="toastContainer"
    class="fixed bottom-20 right-6 sm:bottom-22 sm:right-8 z-50 flex flex-col gap-2 items-end pointer-events-none">
  </div>

  <!-- ======================== JAVASCRIPT ======================== -->
  <script>
    // =============================================================
    // DATA LAYER
    // Store student data in an array of objects.
    // TODO: In future, replace this static array with an API call
    //       e.g., fetch('/api/students').then(res => res.json())
    // =============================================================
    const students = [
      { id: 1, name: "Ali Hassan", rollNo: "CS-101", phone: "+923344313436", status: null },
      { id: 2, name: "Sara Ahmed", rollNo: "CS-102", phone: "+923344313436", status: null },
      { id: 3, name: "Omar Farooq", rollNo: "CS-103", phone: "+923344313436", status: null },
      { id: 4, name: "Fatima Zahra", rollNo: "CS-104", phone: "+923344313436", status: null },
      { id: 5, name: "Hassan Raza", rollNo: "CS-105", phone: "+923344313436", status: null },
      { id: 6, name: "Ayesha Khan", rollNo: "CS-106", phone: "+923344313436", status: null },
      { id: 7, name: "Bilal Mahmood", rollNo: "CS-107", phone: "+923344313436", status: null },
      { id: 8, name: "Zainab Tariq", rollNo: "CS-108", phone: "+923344313436", status: null },
    ];

    // Attendance state map: { studentId: "Present" | "Absent" | null }
    const attendanceState = {};

    // Initialize state — all unmarked
    students.forEach(s => { attendanceState[s.id] = null; });


    // =============================================================
    // STORAGE LAYER (localStorage — swap for API calls later)
    // =============================================================

    /** Get today's date as YYYY-MM-DD string */
    function getTodayDate() {
      return new Date().toISOString().split('T')[0];
    }

    // Storage key — keep consistent for future backend swap
    const STORAGE_KEY = 'attendance';

    /**
     * saveAttendance(data)
     * Persists attendance data to localStorage.
     *
     * TODO: Replace with API call:
     *       fetch('/api/attendance/save', {
     *         method: 'POST',
     *         headers: { 'Content-Type': 'application/json' },
     *         body: JSON.stringify(todayData)
     *       })
     */
    function saveAttendance(todayData) {
      let existing = [];
      try {
        existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        if (!Array.isArray(existing)) {
          existing = [];
        }
      } catch (e) {
        existing = [];
      }

      const existingDateIndex = existing.findIndex(entry => entry.date === todayData.date);

      if (existingDateIndex >= 0) {
        // Replace today's data to avoid duplicates
        existing[existingDateIndex] = todayData;
      } else {
        // Add new day
        existing.push(todayData);
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
    }

    /**
     * loadAttendance()
     * Checks localStorage for saved attendance data.
     * If data exists and matches today's date, restores button states.
     * Called once on page load inside init().
     *
     * TODO: Replace with API call:
     *       fetch(`/api/attendance?date=${getTodayDate()}`)
     *         .then(res => res.json())
     *         .then(data => { ... restore state ... })
     */
    function loadAttendance() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const data = JSON.parse(saved);

        if (!Array.isArray(data) || data.length === 0) return;

        const todayStr = getTodayDate();
        const todayRecord = data.find(entry => entry.date === todayStr);

        if (!todayRecord || !Array.isArray(todayRecord.students)) return;

        // Restore each student's status into attendanceState
        todayRecord.students.forEach(record => {
          if (attendanceState.hasOwnProperty(record.id) && (record.status === 'Present' || record.status === 'Absent')) {
            attendanceState[record.id] = record.status;
          }
        });

        // Update all row UIs to reflect restored state
        students.forEach(s => updateRowUI(s.id));
        updateCounts();

        showToast('📂 Restored today\'s saved attendance', 'info');
      } catch (e) {
        console.error('Failed to load attendance:', e);
      }
    }


    // =============================================================
    // SAVED RECORDS VIEWER
    // =============================================================

    let savedPanelOpen = false;

    /**
     * Toggle the saved records panel visibility.
     */
    function toggleSavedRecords() {
      savedPanelOpen = !savedPanelOpen;
      const panel = document.getElementById('savedRecordsPanel');
      const arrow = document.getElementById('savedToggleArrow');

      if (savedPanelOpen) {
        panel.classList.remove('hidden');
        arrow.style.transform = 'rotate(180deg)';
        renderSavedRecords();
      } else {
        panel.classList.add('hidden');
        arrow.style.transform = 'rotate(0deg)';
      }
    }

    /**
     * Render saved records from localStorage into the viewer panel.
     */
    function renderSavedRecords() {
      const container = document.getElementById('savedRecordsContent');
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        container.innerHTML = `
          <div class="text-center py-6 text-gray-400">
            <p class="text-3xl mb-2">📭</p>
            <p class="text-sm font-500">No saved records yet</p>
            <p class="text-xs mt-1">Mark attendance and submit to save</p>
          </div>`;
        return;
      }

      try {
        const data = JSON.parse(saved);
        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = `
            <div class="text-center py-6 text-gray-400">
              <p class="text-3xl mb-2">📭</p>
              <p class="text-sm font-500">No saved records yet</p>
            </div>`;
          return;
        }

        let html = '';

        // Loop backwards to show newest first
        for (let i = data.length - 1; i >= 0; i--) {
          const dayRecord = data[i];
          const date = dayRecord.date || 'Unknown';
          const studentsRecord = dayRecord.students || [];

          const presentCount = studentsRecord.filter(r => r.status === 'Present').length;
          const absentCount = studentsRecord.filter(r => r.status === 'Absent').length;

          html += `
            <div class="mb-6 last:mb-0">
              <div class="mb-3 flex items-center justify-between">
                <span class="text-xs font-600 text-gray-500">📅 Date: ${date}</span>
                <span class="text-xs text-gray-400">${studentsRecord.length} students</span>
              </div>
              <div class="flex items-center justify-between mb-3">
                <div class="flex gap-3">
                  <span class="text-xs px-2.5 py-1 rounded-lg bg-emerald-50 text-emerald-700 font-600">✅ Present: ${presentCount}</span>
                  <span class="text-xs px-2.5 py-1 rounded-lg bg-red-50 text-red-600 font-600">❌ Absent: ${absentCount}</span>
                </div>
                <button onclick="toggleDayDetails('${date}')" class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-600 rounded-lg transition-colors cursor-pointer flex items-center gap-1">
                  <span id="view-text-${date}">View Details</span><span id="arrow-${date}">▼</span>
                </button>
              </div>
              <div id="details-${date}" class="hidden divide-y divide-gray-100 border border-gray-100 rounded-xl overflow-hidden shadow-sm mt-3">`;

          studentsRecord.forEach(record => {
            const isPresent = record.status === 'Present';
            const isAbsent = record.status === 'Absent';
            const statusBg = isPresent ? 'bg-emerald-50 text-emerald-700' : (isAbsent ? 'bg-red-50 text-red-600' : 'bg-gray-50 text-gray-500');
            const statusIcon = isPresent ? '✅' : (isAbsent ? '❌' : '➖');

            html += `
              <div class="flex items-center justify-between px-3 py-2.5 text-sm bg-white hover:bg-gray-50 transition-colors">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-gray-400 font-500 w-6">#${record.id}</span>
                  <span class="font-600 text-gray-800">${record.name}</span>
                </div>
                <span class="text-xs px-2 py-1 rounded-md font-600 ${statusBg}">${statusIcon} ${record.status || 'Unmarked'}</span>
              </div>`;
          });

          html += `
              </div>
            </div>`;
        }

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `
          <div class="text-center py-6 text-red-400">
            <p class="text-sm font-500">⚠️ Stored data is corrupted</p>
            <p class="text-xs mt-1">Click "Clear Data" to reset</p>
          </div>`;
      }
    }

    /**
     * Toggles the visibility of student details for a specific saved day.
     */
    function toggleDayDetails(date) {
      const detailsDiv = document.getElementById(`details-${date}`);
      const arrow = document.getElementById(`arrow-${date}`);
      const text = document.getElementById(`view-text-${date}`);

      if (!detailsDiv) return;

      if (detailsDiv.classList.contains('hidden')) {
        detailsDiv.classList.remove('hidden');
        arrow.textContent = '▲';
        text.textContent = 'Hide Details';
      } else {
        detailsDiv.classList.add('hidden');
        arrow.textContent = '▼';
        text.textContent = 'View Details';
      }
    }

    /**
     * Clear all saved attendance data from localStorage.
     */
    function clearSavedRecords() {
      if (!confirm('Are you sure you want to clear all saved attendance data?')) return;

      localStorage.removeItem(STORAGE_KEY);
      // TODO: Replace with API call — DELETE /api/attendance?date=${getTodayDate()}

      // Reset UI state
      students.forEach(s => {
        attendanceState[s.id] = null;
        updateRowUI(s.id);
      });
      updateCounts();

      // Re-render the panel
      renderSavedRecords();
      showToast('🗑️ Saved data cleared', 'info');
    }


    // =============================================================
    // RENDERING
    // =============================================================

    /**
     * Render the full student list into the DOM.
     * Each row uses data-student-id for linking UI → data.
     */
    function renderStudentList() {
      const container = document.getElementById('studentList');
      container.innerHTML = '';

      students.forEach((student, index) => {
        const row = document.createElement('div');
        row.setAttribute('data-student-id', student.id);
        row.id = `row-${student.id}`;
        row.className = 'row-default flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4 p-4 sm:p-5 transition-all';

        // Generate initials for avatar
        const initials = student.name.split(' ').map(n => n[0]).join('');
        // Deterministic color from ID
        const colors = [
          'bg-blue-100 text-blue-700',
          'bg-emerald-100 text-emerald-700',
          'bg-purple-100 text-purple-700',
          'bg-amber-100 text-amber-700',
          'bg-rose-100 text-rose-700',
          'bg-cyan-100 text-cyan-700',
          'bg-indigo-100 text-indigo-700',
          'bg-teal-100 text-teal-700',
        ];
        const colorClass = colors[index % colors.length];

        row.innerHTML = `
          <div class="flex items-center gap-3 sm:gap-4">
            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full ${colorClass} flex items-center justify-center font-700 text-sm sm:text-base shrink-0">
              ${initials}
            </div>
            <div>
              <div class="font-600 text-gray-900 text-sm sm:text-base">${student.name}</div>
              <div class="text-xs text-gray-400 font-500">${student.rollNo} · ID #${student.id}</div>
            </div>
          </div>
          <div class="flex gap-2 sm:gap-3 ml-13 sm:ml-0">
            <button
              type="button"
              class="att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 border-emerald-200 text-emerald-700 bg-emerald-50 cursor-pointer"
              data-student-id="${student.id}"
              data-action="Present"
              onclick="markAttendance(${student.id}, 'Present')"
              aria-label="Mark ${student.name} as present"
            >
              Present ✅
            </button>
            <button
              type="button"
              class="att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 border-red-200 text-red-600 bg-red-50 cursor-pointer"
              data-student-id="${student.id}"
              data-action="Absent"
              onclick="markAttendance(${student.id}, 'Absent')"
              aria-label="Mark ${student.name} as absent"
            >
              Absent ❌
            </button>
          </div>
        `;

        container.appendChild(row);
      });

      updateCounts();
    }


    // =============================================================
    // CORE FUNCTIONS
    // =============================================================

    /**
     * markAttendance(id, status)
     * Updates the student's attendance state and refreshes their UI row.
     * 
     * @param {number} id     - The unique student ID
     * @param {string} status - "Present" or "Absent"
     *
     * TODO: In future, this function can also push the change
     *       to a backend via API call:
     *       fetch('/api/attendance', { method: 'POST', body: ... })
     */
    function markAttendance(id, status) {
      // Toggle: if same status clicked again, unmark
      if (attendanceState[id] === status) {
        attendanceState[id] = null;
      } else {
        attendanceState[id] = status;
      }

      updateRowUI(id);
      updateCounts();
    }

    /**
     * Update a single row's button styles based on current state.
     */
    function updateRowUI(id) {
      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      const status = attendanceState[id];
      const presentBtn = row.querySelector('[data-action="Present"]');
      const absentBtn = row.querySelector('[data-action="Absent"]');

      // Reset both buttons
      presentBtn.className = 'att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 cursor-pointer';
      absentBtn.className = 'att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 cursor-pointer';

      // Reset row border
      row.classList.remove('row-marked-present', 'row-marked-absent', 'row-default', 'row-unmarked');

      if (status === 'Present') {
        presentBtn.classList.add('present-active');
        absentBtn.classList.add('border-gray-200', 'text-gray-400', 'bg-gray-50');
        row.classList.add('row-marked-present');
      } else if (status === 'Absent') {
        absentBtn.classList.add('absent-active');
        presentBtn.classList.add('border-gray-200', 'text-gray-400', 'bg-gray-50');
        row.classList.add('row-marked-absent');
      } else {
        presentBtn.classList.add('border-emerald-200', 'text-emerald-700', 'bg-emerald-50');
        absentBtn.classList.add('border-red-200', 'text-red-600', 'bg-red-50');
        row.classList.add('row-default');
      }
    }

    /**
     * Update the summary counts and progress bar.
     */
    function updateCounts() {
      const total = students.length;
      const present = Object.values(attendanceState).filter(s => s === 'Present').length;
      const absent = Object.values(attendanceState).filter(s => s === 'Absent').length;
      const marked = present + absent;

      document.getElementById('countTotal').textContent = total;
      document.getElementById('countPresent').textContent = present;
      document.getElementById('countAbsent').textContent = absent;
      document.getElementById('progressText').textContent = `${marked} / ${total}`;

      const pct = total > 0 ? (marked / total) * 100 : 0;
      document.getElementById('progressBar').style.width = `${pct}%`;

      // Update progress bar color
      const bar = document.getElementById('progressBar');
      if (pct === 100) {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-emerald-400 to-emerald-500 rounded-full';
      } else if (pct >= 50) {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full';
      } else {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full';
      }

      // Pulse the submit button when all are marked
      const submitBtn = document.getElementById('submitBtn');
      if (pct === 100) {
        submitBtn.classList.add('submit-ready');
      } else {
        submitBtn.classList.remove('submit-ready');
      }
    }


    function submitAttendance() {
      // Sync UI state into student object (since UI uses attendanceState)
      students.forEach(s => s.status = attendanceState[s.id]);

      // 1. VALIDATION - No unmarked students
      const unmarked = students.filter(s => s.status === null);
      if (unmarked.length > 0) {
        alert(`⚠️ Please mark attendance for ${unmarked.length} student(s)`);
        return;
      }

      // 2. FIXED DATE FORMAT
      const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

      // 3. EXISTING: Save to localStorage
      localStorage.setItem(`attendance_${today}`, JSON.stringify(students));

      // Maintain compatibility with existing UI records panel
      saveAttendance({
        date: today,
        students: students.map(s => ({ id: s.id, name: s.name, status: s.status }))
      });

      // 4. DETECT ABSENTEES
      const absentees = students.filter(s => s.status === "Absent" || s.status === null);

      console.log(`🔍 ${today} - ABSENTEES DETECTED: ${absentees.length}`);

      const totalStudents = students.length;
      const presentCount = students.filter(s => s.status === "Present").length;
      const absentCount = absentees.length;

      // 5. Send to Express server
      fetch('https://the-eye-aoyu.onrender.com/submit-attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: today,
          totalStudents,
          presentCount,
          absentCount,
          absentees: absentees.map(s => ({ ...s, phoneValid: !!s.phone }))
        })
      })
        .then(response => response.json())
        .then(data => {
          console.log('✅ Server response:', data);
          alert(`✅ Attendance submitted! Server received ${absentees.length} absentees.`);
        })
        .catch(error => {
          console.error('❌ Server error:', error);
          alert('⚠️ Server connection failed - attendance still saved locally');
        });

      // Update UI panels if applicable
      if (typeof savedPanelOpen !== 'undefined' && savedPanelOpen && typeof renderSavedRecords === 'function') {
        renderSavedRecords();
      }

      // 7. Reset for next day (optional)
      students.forEach(s => {
        attendanceState[s.id] = null;
        s.status = null;
        if (typeof updateRowUI === 'function') updateRowUI(s.id);
      });
      if (typeof updateCounts === 'function') updateCounts();

      // TODO Phase 4: Replace console.logs → fetch("/send-sms")
    }





    // =============================================================
    // BULK ACTIONS
    // =============================================================

    function markAllPresent() {
      students.forEach(s => {
        attendanceState[s.id] = 'Present';
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('✅ All marked present', 'success');
    }

    function markAllAbsent() {
      students.forEach(s => {
        attendanceState[s.id] = 'Absent';
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('❌ All marked absent', 'info');
    }

    function resetAll() {
      students.forEach(s => {
        attendanceState[s.id] = null;
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('↺ All marks cleared', 'info');
    }


    // =============================================================
    // TOAST NOTIFICATIONS
    // =============================================================

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');

      const bgMap = {
        success: 'bg-emerald-600',
        warning: 'bg-amber-500',
        info: 'bg-gray-700',
        error: 'bg-red-600',
      };

      toast.className = `toast ${bgMap[type] || bgMap.info} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-600 whitespace-nowrap`;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 3000);
    }


    // =============================================================
    // INITIALIZATION
    // =============================================================

    function init() {
      // Display today's date
      const today = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-US', options);

      // Render student list
      renderStudentList();

      // Restore saved attendance from localStorage (if exists for today)
      loadAttendance();
    }

    // TODO: Future — Load class/section from URL params or user selection
    // TODO: Future — Check if attendance already submitted for today

    // Boot up
    document.addEventListener('DOMContentLoaded', init);
  </script>
