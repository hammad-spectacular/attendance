<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register School — The Eye</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
[data-theme="dark"] {
  --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
  --text: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
  --primary: #4f46e5; --primary-light: #818cf8;
  --success: #22c55e;
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
  --success-bg: rgba(34,197,94,0.1);
}
[data-theme="light"] {
  --bg: #f1f5f9; --bg-card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --primary: #4f46e5; --primary-light: #6366f1;
  --success: #16a34a;
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
  --success-bg: rgba(34,197,94,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.4s ease;
}
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px 36px;
  width: 90%; max-width: 460px;
  box-shadow: var(--shadow-lg); animation: fadeInUp 0.5s ease-out;
}
.header { text-align: center; margin-bottom: 28px; }
.header .icon {
  width: 56px; height: 56px;
  background: var(--gradient); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; font-size: 1.5rem; color: white;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.header h1 { font-size: 1.3rem; font-weight: 800; }
.header p { font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-secondary); margin-bottom: 6px;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 12px 14px;
  border-radius: 10px; border: 2px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.25s ease;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
.form-group textarea { resize: vertical; min-height: 80px; }
.btn {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  background: var(--gradient); color: white;
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 700; cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.btn:hover { box-shadow: 0 6px 18px rgba(79,70,229,0.45); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.msg {
  padding: 14px; border-radius: 10px;
  font-size: 0.85rem; font-weight: 500; margin-top: 14px;
  display: none; text-align: center;
}
.msg.show { display: block; }
.msg.success { background: var(--success-bg); border: 1px solid rgba(34,197,94,0.2); color: var(--success); }
.msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
.footer-link { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); }
.footer-link a { color: var(--primary-light); text-decoration: none; font-weight: 600; }
.footer-link a:hover { text-decoration: underline; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; }
.theme-toggle { position:fixed; top:20px; right:20px; width:40px; height:40px; border-radius:50%; border:2px solid var(--border); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all 0.3s ease; }
.theme-toggle:hover { border-color:var(--primary); color:var(--primary); transform:rotate(20deg); }
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width:480px) { .card { padding: 28px 20px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="card">
  <div class="header">
    <div class="icon"><i class="fas fa-school"></i></div>
    <h1>Register Your School</h1>
    <p>Submit a request to join The Eye system</p>
  </div>

  <form id="registerForm" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="schoolName">School Name</label>
      <input type="text" id="schoolName" placeholder="e.g. Harvard Academy" required>
    </div>
    <div class="form-group">
      <label for="contactPerson">Contact Person Name</label>
      <input type="text" id="contactPerson" placeholder="e.g. John Doe" required>
    </div>
    <div class="form-group">
      <label for="contactEmail">Contact Email</label>
      <input type="email" id="contactEmail" placeholder="e.g. admin@school.com" required>
    </div>
    <div class="form-group">
      <label for="message">Message (optional)</label>
      <textarea id="message" placeholder="Any additional information..."></textarea>
    </div>

    <div class="msg" id="registerMsg"></div>

    <button type="submit" class="btn" id="submitBtn">
      <span id="btnText">Send Request</span>
    </button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="./login.html">Sign in</a>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('themeIcon');
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('attendance-theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('attendance-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
})();

async function handleRegister(e) {
  e.preventDefault();
  const schoolName = document.getElementById('schoolName').value.trim();
  const contactPerson = document.getElementById('contactPerson').value.trim();
  const contactEmail = document.getElementById('contactEmail').value.trim();
  const message = document.getElementById('message').value.trim();
  const msgEl = document.getElementById('registerMsg');
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');

  msgEl.classList.remove('show', 'success', 'error');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Sending...';

  try {
    const res = await fetch('https://attendance-production-fb0b.up.railway.app/api/auth/register-school', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ school_name: schoolName, contact_person: contactPerson, contact_email: contactEmail, message })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = data.error || 'Failed to submit request';
      msgEl.className = 'msg error show';
      btn.disabled = false;
      btnText.textContent = 'Send Request';
      return;
    }

    msgEl.textContent = 'Your request has been received. You will be contacted shortly.';
    msgEl.className = 'msg success show';
    document.getElementById('registerForm').reset();
    btn.disabled = false;
    btnText.textContent = 'Send Request';
  } catch (err) {
    msgEl.textContent = 'Connection error. Please try again.';
    msgEl.className = 'msg error show';
    btn.disabled = false;
    btnText.textContent = 'Send Request';
  }
}
</script>
</body>
</html>
