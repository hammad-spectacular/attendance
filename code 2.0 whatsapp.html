<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Attendance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { font-family: 'Inter', sans-serif; }

    /* Smooth button transitions */
    .att-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Present button active state */
    .att-btn.present-active {
      background-color: #059669 !important;
      color: white !important;
      border-color: #059669 !important;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.25);
      transform: scale(1.03);
    }

    /* Absent button active state */
    .att-btn.absent-active {
      background-color: #dc2626 !important;
      color: white !important;
      border-color: #dc2626 !important;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25);
      transform: scale(1.03);
    }

    /* Unmarked row highlight (validation) */
    .row-unmarked {
      animation: pulse-warn 0.6s ease-in-out 3;
    }

    @keyframes pulse-warn {
      0%, 100% { background-color: transparent; }
      50% { background-color: #fef3c7; }
    }

    /* Row marked indicator */
    .row-marked-present {
      border-left: 4px solid #059669;
    }
    .row-marked-absent {
      border-left: 4px solid #dc2626;
    }
    .row-default {
      border-left: 4px solid transparent;
    }

    /* Toast notification */
    .toast {
      animation: slideUp 0.4s ease-out, fadeOut 0.4s ease-in 2.6s forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Progress bar fill */
    .progress-fill {
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Hover effects for desktop */
    @media (hover: hover) {
      .att-btn:not(.present-active):not(.absent-active):hover {
        transform: scale(1.05);
      }
    }

    /* Summary cards entrance */
    .summary-card {
      animation: popIn 0.3s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Floating submit button pulse when all marked */
    .submit-ready {
      animation: submitPulse 2s ease-in-out infinite;
    }
    @keyframes submitPulse {
      0%, 100% { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 10px 35px -5px rgba(59, 130, 246, 0.5); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ======================== HEADER ======================== -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-4 sm:py-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl sm:text-2xl font-800 text-gray-900 tracking-tight flex items-center gap-2">
            <span class="text-2xl sm:text-3xl">📋</span>
            Attendance
          </h1>
          <p class="text-xs sm:text-sm text-gray-500 mt-0.5" id="dateDisplay"></p>
        </div>
        <div class="text-right">
          <div class="text-xs text-gray-400 uppercase tracking-wider font-600 mb-1">Progress</div>
          <div id="progressText" class="text-sm font-700 text-gray-700">0 / 0</div>
        </div>
      </div>
      <!-- Progress Bar -->
      <div class="mt-3 h-2 bg-gray-100 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-fill h-full bg-gradient-to-r from-emerald-400 to-emerald-600 rounded-full" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- ======================== MAIN ======================== -->
  <main class="max-w-2xl mx-auto px-4 py-5 sm:py-8 pb-24">

    <!-- Summary Cards -->
    <div class="grid grid-cols-3 gap-3 mb-6" id="summaryCards">
      <div class="summary-card bg-white rounded-xl p-3 sm:p-4 text-center border border-gray-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-gray-800" id="countTotal">0</div>
        <div class="text-xs text-gray-400 font-600 uppercase tracking-wider mt-1">Total</div>
      </div>
      <div class="summary-card bg-emerald-50 rounded-xl p-3 sm:p-4 text-center border border-emerald-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-emerald-600" id="countPresent">0</div>
        <div class="text-xs text-emerald-500 font-600 uppercase tracking-wider mt-1">Present</div>
      </div>
      <div class="summary-card bg-red-50 rounded-xl p-3 sm:p-4 text-center border border-red-100 shadow-sm">
        <div class="text-2xl sm:text-3xl font-800 text-red-500" id="countAbsent">0</div>
        <div class="text-xs text-red-400 font-600 uppercase tracking-wider mt-1">Absent</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="flex gap-2 mb-5">
      <button onclick="markAllPresent()" class="flex-1 text-xs sm:text-sm font-600 py-2.5 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 transition-colors cursor-pointer">
        ✅ Mark All Present
      </button>
      <button onclick="markAllAbsent()" class="flex-1 text-xs sm:text-sm font-600 py-2.5 rounded-lg bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 transition-colors cursor-pointer">
        ❌ Mark All Absent
      </button>
      <button onclick="resetAll()" class="text-xs sm:text-sm font-600 py-2.5 px-4 rounded-lg bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100 transition-colors cursor-pointer">
        ↺ Reset
      </button>
    </div>

    <!-- Student List -->
    <section aria-label="Student attendance list">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-100" id="studentList">
        <!-- Student rows rendered by JS -->
      </div>
    </section>

    <!-- ======================== SAVED RECORDS VIEWER ======================== -->
    <section class="mt-6 mb-8" aria-label="Saved attendance records">
      <button
        onclick="toggleSavedRecords()"
        class="w-full py-3 px-4 rounded-xl border-2 border-dashed border-gray-300 text-gray-500 font-600 text-sm
               hover:border-blue-400 hover:text-blue-600 transition-all cursor-pointer flex items-center justify-center gap-2 bg-white/50"
        id="toggleSavedBtn"
      >
        <span>📋</span>
        <span>View Saved Records</span>
        <span id="savedToggleArrow" class="text-xs transition-transform duration-300">▼</span>
      </button>

      <div id="savedRecordsPanel" class="hidden mt-3 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-700 text-gray-800 text-sm flex items-center gap-2">
            <span>💾</span> Stored on this device
          </h3>
           <button
            onclick="clearSavedRecords()"
            class="text-xs px-3 py-1.5 rounded-lg bg-red-50 text-red-600 font-600 hover:bg-red-100 transition-colors cursor-pointer"
          >
            🗑️ Clear All History
          </button>
        </div>
        <div id="savedRecordsContent" class="p-4">
          <!-- Records rendered by JS -->
        </div>
        <div class="px-4 pb-3">
          <p class="text-[11px] text-gray-400 flex items-center gap-1">
            <span>ℹ️</span> Data is stored in your browser's localStorage. It stays on this device only, in this browser.
          </p>
        </div>
      </div>
    </section>

  </main>

  <!-- ======================== FLOATING SUBMIT BUTTON (bottom-right) ======================== -->
  <button
    id="submitBtn"
    onclick="submitAttendance()"
    class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-30
           py-3.5 px-6 sm:px-8 rounded-2xl font-700 text-sm sm:text-base transition-all cursor-pointer
           bg-gradient-to-r from-blue-600 to-indigo-600 text-white
           hover:from-blue-700 hover:to-indigo-700
           active:scale-[0.95] shadow-xl shadow-blue-500/30
           flex items-center gap-2"
    aria-label="Submit Attendance"
  >
    <span>Submit</span>
    <span class="text-lg">→</span>
  </button>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-20 right-6 sm:bottom-22 sm:right-8 z-50 flex flex-col gap-2 items-end pointer-events-none"></div>

  <!-- ======================== JAVASCRIPT ======================== -->
  <script>
    // =============================================================
    // DATA LAYER
    // Store student data in an array of objects.
    // TODO: In future, replace this static array with an API call
    //       e.g., fetch('/api/students').then(res => res.json())
    // =============================================================
    const students = [
      { id: 1,  name: "Ali Hassan",      rollNo: "CS-101", phone: "+923001234567" },
      { id: 2,  name: "Sara Ahmed",      rollNo: "CS-102", phone: "+923111234567" },
      { id: 3,  name: "Omar Farooq",     rollNo: "CS-103", phone: "+923211234567" },
      { id: 4,  name: "Fatima Zahra",    rollNo: "CS-104", phone: "+923411234567" },
      { id: 5,  name: "Hassan Raza",     rollNo: "CS-105", phone: "+923511234567" },
      { id: 6,  name: "Ayesha Khan",     rollNo: "CS-106", phone: "+923611234567" },
      { id: 7,  name: "Bilal Mahmood",   rollNo: "CS-107", phone: "+923711234567" },
      { id: 8,  name: "Zainab Tariq",    rollNo: "CS-108", phone: "+923811234567" }
    ];

    // Attendance state map: { studentId: "Present" | "Absent" | null }
    const attendanceState = {};

    // Initialize state — all unmarked
    students.forEach(s => { attendanceState[s.id] = null; });


    // =============================================================
    // STORAGE LAYER (localStorage — swap for API calls later)
    // Stores MULTIPLE days in a single key as an array of records.
    //
    // Format:
    // [
    //   {
    //     "date": "2026-03-21",
    //     "students": [
    //       { "id": 1, "name": "Ali Hassan", "status": "Present" },
    //       { "id": 2, "name": "Sara Ahmed", "status": "Absent" }
    //     ]
    //   },
    //   { "date": "2026-03-22", "students": [...] }
    // ]
    //
    // Same-day submissions REPLACE (not duplicate).
    // Old days are never deleted unless user explicitly clears.
    // =============================================================

    /** Get today's date as YYYY-MM-DD string */
    function getTodayDate() {
      return new Date().toISOString().split('T')[0];
    }

    // Single storage key — change only this for future backend swap
    const STORAGE_KEY = 'attendance';

    /**
     * getAllRecords()
     * Returns the full attendance history array from localStorage.
     *
     * TODO: Replace with API call:
     *       fetch('/api/attendance').then(res => res.json())
     */
    function getAllRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    /**
     * saveAllRecords(records)
     * Writes the full attendance history array to localStorage.
     *
     * TODO: Replace with API call:
     *       fetch('/api/attendance/save', {
     *         method: 'POST',
     *         headers: { 'Content-Type': 'application/json' },
     *         body: JSON.stringify(records)
     *       })
     */
    function saveAllRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    /**
     * Get all stored dates (sorted newest first).
     */
    function getStoredDates() {
      const records = getAllRecords();
      return records
        .map(r => r.date)
        .sort((a, b) => b.localeCompare(a)); // newest first
    }

    /**
     * saveAttendance(studentsData)
     * Saves today's attendance into the history array.
     * If today already exists → replaces it (no duplicates).
     * If today is new → pushes it to the array.
     *
     * TODO: Replace internals with API call when backend is ready.
     */
    function saveAttendance(studentsData) {
      const today = getTodayDate();
      const existing = getAllRecords();

      // Build today's record in the clean format
      const todayRecord = {
        date: today,
        students: studentsData.map(s => ({
          id: s.id,
          name: s.name,
          status: s.status
        }))
      };

      // Check if today already has an entry → replace it
      const index = existing.findIndex(r => r.date === today);
      if (index !== -1) {
        existing[index] = todayRecord; // replace, don't duplicate
      } else {
        existing.push(todayRecord); // new day
      }

      saveAllRecords(existing);
    }

    /**
     * getAttendanceForDate(date)
     * Returns the students array for a specific date, or null.
     *
     * TODO: Replace with API call:
     *       fetch(`/api/attendance?date=${date}`)
     */
    function getAttendanceForDate(date) {
      const records = getAllRecords();
      const entry = records.find(r => r.date === date);
      return entry && Array.isArray(entry.students) && entry.students.length > 0
        ? entry.students
        : null;
    }

    /**
     * deleteSingleDateRecord(date)
     * Removes a specific date's record from the history array.
     *
     * TODO: Replace with API call:
     *       fetch(`/api/attendance?date=${date}`, { method: 'DELETE' })
     */
    function deleteSingleDateRecord(date) {
      const existing = getAllRecords();
      const filtered = existing.filter(r => r.date !== date);
      saveAllRecords(filtered);
    }

    /**
     * clearAllRecords()
     * Wipes the entire attendance history from localStorage.
     *
     * TODO: Replace with API call:
     *       fetch('/api/attendance/all', { method: 'DELETE' })
     */
    function clearAllRecords() {
      localStorage.removeItem(STORAGE_KEY);
    }

    /**
     * loadAttendance()
     * Checks localStorage for today's saved attendance data.
     * If data exists, restores button states. Old days are NOT deleted.
     * Called once on page load inside init().
     *
     * TODO: Replace with API call:
     *       fetch(`/api/attendance?date=${getTodayDate()}`)
     *         .then(res => res.json())
     *         .then(data => { ... restore state ... })
     */
    function loadAttendance() {
      const today = getTodayDate();
      const data = getAttendanceForDate(today);
      if (!data) return;

      // Restore each student's status into attendanceState
      data.forEach(record => {
        if (attendanceState.hasOwnProperty(record.id) && (record.status === 'Present' || record.status === 'Absent')) {
          attendanceState[record.id] = record.status;
        }
      });

      // Update all row UIs to reflect restored state
      students.forEach(s => updateRowUI(s.id));
      updateCounts();

      showToast('📂 Restored today\'s saved attendance', 'info');
    }


    // =============================================================
    // SAVED RECORDS VIEWER
    // =============================================================

    let savedPanelOpen = false;

    /**
     * Toggle the saved records panel visibility.
     */
    function toggleSavedRecords() {
      savedPanelOpen = !savedPanelOpen;
      const panel = document.getElementById('savedRecordsPanel');
      const arrow = document.getElementById('savedToggleArrow');

      if (savedPanelOpen) {
        panel.classList.remove('hidden');
        arrow.style.transform = 'rotate(180deg)';
        renderSavedRecords();
      } else {
        panel.classList.add('hidden');
        arrow.style.transform = 'rotate(0deg)';
      }
    }

    /**
     * Format a date string to readable format (e.g., "Fri, Mar 21, 2026")
     */
    function formatDate(dateStr) {
      try {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      } catch (e) {
        return dateStr;
      }
    }

    /**
     * Check if a date string is today.
     */
    function isToday(dateStr) {
      return dateStr === getTodayDate();
    }

    // Track which date cards are expanded in the viewer
    const expandedDates = {};

    /**
     * Toggle expand/collapse of a specific date's detail in the viewer.
     */
    function toggleDateDetail(date) {
      expandedDates[date] = !expandedDates[date];
      renderSavedRecords();
    }

    /**
     * Render saved records from localStorage into the viewer panel.
     * Shows ALL stored dates, newest first, with expandable detail.
     */
    function renderSavedRecords() {
      const container = document.getElementById('savedRecordsContent');
      const dates = getStoredDates(); // newest first

      if (dates.length === 0) {
        container.innerHTML = `
          <div class="text-center py-6 text-gray-400">
            <p class="text-3xl mb-2">📭</p>
            <p class="text-sm font-500">No saved records yet</p>
            <p class="text-xs mt-1">Mark attendance and submit to save</p>
          </div>`;
        return;
      }

      let html = `<p class="text-xs text-gray-400 mb-3 font-500">📅 ${dates.length} day${dates.length > 1 ? 's' : ''} of records stored</p>`;

      dates.forEach(date => {
        const data = getAttendanceForDate(date);
        if (!data) return;

        const presentCount = data.filter(r => r.status === 'Present').length;
        const absentCount = data.filter(r => r.status === 'Absent').length;
        const isExpanded = expandedDates[date] || false;
        const todayBadge = isToday(date) ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-700 ml-2">TODAY</span>' : '';

        html += `
          <div class="mb-3 rounded-xl border ${isToday(date) ? 'border-blue-200 bg-blue-50/30' : 'border-gray-100 bg-white'} overflow-hidden">
            <!-- Date Header (clickable to expand) -->
            <button onclick="toggleDateDetail('${date}')"
              class="w-full px-3.5 py-3 flex items-center justify-between cursor-pointer hover:bg-gray-50/50 transition-colors">
              <div class="flex items-center gap-2 text-left">
                <span class="text-sm">📅</span>
                <span class="text-sm font-700 text-gray-800">${formatDate(date)}</span>
                ${todayBadge}
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[11px] px-2 py-0.5 rounded-md bg-emerald-50 text-emerald-700 font-600">✅${presentCount}</span>
                <span class="text-[11px] px-2 py-0.5 rounded-md bg-red-50 text-red-600 font-600">❌${absentCount}</span>
                <span class="text-xs text-gray-400 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}">▼</span>
              </div>
            </button>`;

        // Expanded student detail
        if (isExpanded) {
          html += `<div class="border-t ${isToday(date) ? 'border-blue-100' : 'border-gray-100'}">
            <div class="divide-y divide-gray-50">`;
          data.forEach(record => {
            const isPresent = record.status === 'Present';
            const statusBg = isPresent ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600';
            const statusIcon = isPresent ? '✅' : '❌';
            html += `
              <div class="flex items-center justify-between px-3.5 py-2 text-sm">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-gray-400 font-500 w-6">#${record.id}</span>
                  <span class="font-600 text-gray-800">${record.name}</span>
                </div>
                <span class="text-xs px-2 py-0.5 rounded-md font-600 ${statusBg}">${statusIcon} ${record.status}</span>
              </div>`;
          });
          html += `</div>
            <div class="px-3.5 py-2 border-t ${isToday(date) ? 'border-blue-100' : 'border-gray-100'} flex justify-end">
              <button onclick="deleteSingleDate('${date}')"
                class="text-[11px] px-2.5 py-1 rounded-lg text-red-500 hover:bg-red-50 transition-colors cursor-pointer font-500">
                🗑️ Delete this day
              </button>
            </div>
          </div>`;
        }

        html += '</div>';
      });

      container.innerHTML = html;
    }

    /**
     * Delete attendance record for a specific date.
     */
    function deleteSingleDate(date) {
      const label = isToday(date) ? "today's" : formatDate(date);
      if (!confirm(`Delete ${label} attendance record?`)) return;

      deleteSingleDateRecord(date);
      delete expandedDates[date];

      // If deleting today's record, also reset the UI state
      if (isToday(date)) {
        students.forEach(s => {
          attendanceState[s.id] = null;
          updateRowUI(s.id);
        });
        updateCounts();
      }

      renderSavedRecords();
      showToast('🗑️ Record for ' + formatDate(date) + ' deleted', 'info');
    }

    /**
     * Clear ALL saved attendance data from localStorage.
     */
    function clearSavedRecords() {
      const dates = getStoredDates();
      if (dates.length === 0) {
        showToast('📭 No records to clear', 'info');
        return;
      }
      if (!confirm(`Are you sure you want to delete ALL ${dates.length} day(s) of attendance records? This cannot be undone.`)) return;

      // Wipe entire history in one call
      clearAllRecords();

      // Reset today's UI state
      students.forEach(s => {
        attendanceState[s.id] = null;
        updateRowUI(s.id);
      });
      updateCounts();

      // Re-render the panel
      renderSavedRecords();
      showToast('🗑️ All attendance records cleared', 'info');
    }


    // =============================================================
    // RENDERING
    // =============================================================

    /**
     * Render the full student list into the DOM.
     * Each row uses data-student-id for linking UI → data.
     */
    function renderStudentList() {
      const container = document.getElementById('studentList');
      container.innerHTML = '';

      students.forEach((student, index) => {
        const row = document.createElement('div');
        row.setAttribute('data-student-id', student.id);
        row.id = `row-${student.id}`;
        row.className = 'row-default flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4 p-4 sm:p-5 transition-all';

        // Generate initials for avatar
        const initials = student.name.split(' ').map(n => n[0]).join('');
        // Deterministic color from ID
        const colors = [
          'bg-blue-100 text-blue-700',
          'bg-emerald-100 text-emerald-700',
          'bg-purple-100 text-purple-700',
          'bg-amber-100 text-amber-700',
          'bg-rose-100 text-rose-700',
          'bg-cyan-100 text-cyan-700',
          'bg-indigo-100 text-indigo-700',
          'bg-teal-100 text-teal-700',
        ];
        const colorClass = colors[index % colors.length];

        row.innerHTML = `
          <div class="flex items-center gap-3 sm:gap-4">
            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full ${colorClass} flex items-center justify-center font-700 text-sm sm:text-base shrink-0">
              ${initials}
            </div>
            <div>
              <div class="font-600 text-gray-900 text-sm sm:text-base">${student.name}</div>
              <div class="text-xs text-gray-400 font-500">${student.rollNo} · ID #${student.id}</div>
            </div>
          </div>
          <div class="flex gap-2 sm:gap-3 ml-13 sm:ml-0">
            <button
              type="button"
              class="att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 border-emerald-200 text-emerald-700 bg-emerald-50 cursor-pointer"
              data-student-id="${student.id}"
              data-action="Present"
              onclick="markAttendance(${student.id}, 'Present')"
              aria-label="Mark ${student.name} as present"
            >
              Present ✅
            </button>
            <button
              type="button"
              class="att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 border-red-200 text-red-600 bg-red-50 cursor-pointer"
              data-student-id="${student.id}"
              data-action="Absent"
              onclick="markAttendance(${student.id}, 'Absent')"
              aria-label="Mark ${student.name} as absent"
            >
              Absent ❌
            </button>
          </div>
        `;

        container.appendChild(row);
      });

      updateCounts();
    }


    // =============================================================
    // CORE FUNCTIONS
    // =============================================================

    /**
     * markAttendance(id, status)
     * Updates the student's attendance state and refreshes their UI row.
     * 
     * @param {number} id     - The unique student ID
     * @param {string} status - "Present" or "Absent"
     *
     * TODO: In future, this function can also push the change
     *       to a backend via API call:
     *       fetch('/api/attendance', { method: 'POST', body: ... })
     */
    function markAttendance(id, status) {
      // Toggle: if same status clicked again, unmark
      if (attendanceState[id] === status) {
        attendanceState[id] = null;
      } else {
        attendanceState[id] = status;
      }

      updateRowUI(id);
      updateCounts();
    }

    /**
     * Update a single row's button styles based on current state.
     */
    function updateRowUI(id) {
      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      const status = attendanceState[id];
      const presentBtn = row.querySelector('[data-action="Present"]');
      const absentBtn  = row.querySelector('[data-action="Absent"]');

      // Reset both buttons
      presentBtn.className = 'att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 cursor-pointer';
      absentBtn.className  = 'att-btn flex-1 sm:flex-none px-5 sm:px-6 py-2.5 sm:py-3 rounded-xl text-sm font-600 border-2 cursor-pointer';

      // Reset row border
      row.classList.remove('row-marked-present', 'row-marked-absent', 'row-default', 'row-unmarked');

      if (status === 'Present') {
        presentBtn.classList.add('present-active');
        absentBtn.classList.add('border-gray-200', 'text-gray-400', 'bg-gray-50');
        row.classList.add('row-marked-present');
      } else if (status === 'Absent') {
        absentBtn.classList.add('absent-active');
        presentBtn.classList.add('border-gray-200', 'text-gray-400', 'bg-gray-50');
        row.classList.add('row-marked-absent');
      } else {
        presentBtn.classList.add('border-emerald-200', 'text-emerald-700', 'bg-emerald-50');
        absentBtn.classList.add('border-red-200', 'text-red-600', 'bg-red-50');
        row.classList.add('row-default');
      }
    }

    /**
     * Update the summary counts and progress bar.
     */
    function updateCounts() {
      const total   = students.length;
      const present = Object.values(attendanceState).filter(s => s === 'Present').length;
      const absent  = Object.values(attendanceState).filter(s => s === 'Absent').length;
      const marked  = present + absent;

      document.getElementById('countTotal').textContent   = total;
      document.getElementById('countPresent').textContent  = present;
      document.getElementById('countAbsent').textContent   = absent;
      document.getElementById('progressText').textContent  = `${marked} / ${total}`;

      const pct = total > 0 ? (marked / total) * 100 : 0;
      document.getElementById('progressBar').style.width = `${pct}%`;

      // Update progress bar color
      const bar = document.getElementById('progressBar');
      if (pct === 100) {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-emerald-400 to-emerald-500 rounded-full';
      } else if (pct >= 50) {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full';
      } else {
        bar.className = 'progress-fill h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full';
      }

      // Pulse the submit button when all are marked
      const submitBtn = document.getElementById('submitBtn');
      if (pct === 100) {
        submitBtn.classList.add('submit-ready');
      } else {
        submitBtn.classList.remove('submit-ready');
      }
    }


    /**
     * submitAttendance()
     * Validates all students are marked, then outputs structured JSON.
     * Implements Phase 3 SMS Logic and Validation.
     *
     * TODO: Replace console.log with API call:
     *       fetch('/api/attendance/submit', {
     *         method: 'POST',
     *         headers: { 'Content-Type': 'application/json' },
     *         body: JSON.stringify(result)
     *       })
     */
    function submitAttendance() {
      // Find unmarked students
      const unmarked = students.filter(s => attendanceState[s.id] === null);

      if (unmarked.length > 0) {
        // Highlight unmarked rows
        unmarked.forEach(s => {
          const row = document.getElementById(`row-${s.id}`);
          if (row) {
            row.classList.remove('row-unmarked');
            // Force reflow to restart animation
            void row.offsetWidth;
            row.classList.add('row-unmarked');
          }
        });

        // Scroll to first unmarked
        const firstUnmarked = document.getElementById(`row-${unmarked[0].id}`);
        if (firstUnmarked) {
          firstUnmarked.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        alert(`⚠️ Please mark attendance for ${unmarked.length} student(s) before submitting.`);
        return;
      }

      // 2. FIXED DATE FORMAT (YYYY-MM-DD)
      const today = new Date().toISOString().split('T')[0];

      // 3. BUILD DATA & SAVE
      const result = students.map(s => ({
        id: s.id,
        name: s.name,
        status: attendanceState[s.id],
        date: today
      }));

      // Save to localStorage (Maintains existing array-based system)
      saveAttendance(result);

      // 4. DETECT ABSENTEES & FAKE SMS LOGS
      // Validation ensures no nulls, so we strictly check for "Absent"
      const absentees = students.filter(s => attendanceState[s.id] === "Absent");

      console.log(`🔍 ${today} - ABSENTEES DETECTED: ${absentees.length}`);
      
      absentees.forEach(student => {
        if (!student.phone || student.phone.length < 10) {
          console.warn(`❌ Missing/invalid phone for ${student.name}`);
          return;
        }
        
        const message = `Your child ${student.name} was absent today.`;
        console.log(`📱 FAKE SMS → ${student.phone}`);
        console.log(`   👤 ${student.name}`);
        console.log(`   📝 ${message}`);
        console.log(`   📅 ${today}`);
        console.log("---");
      });

      // 6. UX Feedback
      alert(`✅ Saved ${students.length} students.\nFAKE SMS logged for ${absentees.length} parents (Check Console).`);

      // 7. Reset for next day (Using existing reset helper)
      resetAll();

      // Refresh saved records panel if it's open
      if (savedPanelOpen) {
        renderSavedRecords();
      }
    }





    // =============================================================
    // BULK ACTIONS
    // =============================================================

    function markAllPresent() {
      students.forEach(s => {
        attendanceState[s.id] = 'Present';
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('✅ All marked present', 'success');
    }

    function markAllAbsent() {
      students.forEach(s => {
        attendanceState[s.id] = 'Absent';
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('❌ All marked absent', 'info');
    }

    function resetAll() {
      students.forEach(s => {
        attendanceState[s.id] = null;
        updateRowUI(s.id);
      });
      updateCounts();
      showToast('↺ All marks cleared', 'info');
    }


    // =============================================================
    // TOAST NOTIFICATIONS
    // =============================================================

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');

      const bgMap = {
        success: 'bg-emerald-600',
        warning: 'bg-amber-500',
        info:    'bg-gray-700',
        error:   'bg-red-600',
      };

      toast.className = `toast ${bgMap[type] || bgMap.info} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-600 whitespace-nowrap`;
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 3000);
    }


    // =============================================================
    // INITIALIZATION
    // =============================================================

    function init() {
      // Display today's date
      const today = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-US', options);

      // Render student list
      renderStudentList();

      // Restore saved attendance from localStorage (if exists for today)
      loadAttendance();
    }

    // TODO: Future — Load class/section from URL params or user selection
    // TODO: Future — Check if attendance already submitted for today

    // Boot up
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
