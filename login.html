<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — The Eye</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
[data-theme="dark"] {
  --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
  --text: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
  --primary: #4f46e5; --primary-light: #818cf8;
  --success: #22c55e; --danger: #ef4444;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
}
[data-theme="light"] {
  --bg: #f1f5f9; --bg-card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --primary: #4f46e5; --primary-light: #6366f1;
  --success: #16a34a; --danger: #dc2626;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.4s ease;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  width: 90%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  animation: fadeInUp 0.5s ease-out;
}
.login-header { text-align: center; margin-bottom: 32px; }
.login-header .icon {
  width: 56px; height: 56px;
  background: var(--gradient);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 1.5rem; color: white;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.login-header h1 { font-size: 1.4rem; font-weight: 800; }
.login-header p { font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-secondary); margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 12px 14px;
  border-radius: 10px; border: 2px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.25s ease, box-shadow 0.25s ease;
}
.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}
.btn {
  width: 100%; padding: 13px;
  border: none; border-radius: 10px;
  background: var(--gradient); color: white;
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 700; cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.btn:hover { box-shadow: 0 6px 18px rgba(79,70,229,0.45); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.8rem;
  font-weight: 500;
  margin-top: 12px;
  display: none;
  animation: fadeIn 0.3s ease-out;
}
.error-msg.show { display: block; }
.footer-link {
  text-align: center; margin-top: 20px;
  font-size: 0.8rem; color: var(--text-muted);
}
.footer-link a { color: var(--primary-light); text-decoration: none; font-weight: 600; }
.footer-link a:hover { text-decoration: underline; }
.theme-toggle {
  position: fixed; top: 20px; right: 20px;
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
}
.theme-toggle:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: rotate(20deg);
}
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 480px) { .login-card { padding: 28px 20px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="login-card">
  <div class="login-header">
    <div class="icon"><i class="fas fa-eye"></i></div>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="fullId">Full ID</label>
      <input type="text" id="fullId" placeholder="e.g. HARV-T001" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
    </div>

    <div class="error-msg" id="loginError"></div>

    <button type="submit" class="btn" id="loginBtn">
      <span id="btnText">Sign In</span>
    </button>
  </form>

  <div class="footer-link">
    Don't have an account? <a href="./register.html">Register your school</a>
  </div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const icon = document.getElementById('themeIcon');
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('attendance-theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('attendance-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';

  const params = new URLSearchParams(window.location.search);
  if (params.get('expired') === '1') {
    const errorEl = document.getElementById('loginError');
    errorEl.textContent = 'Your session has expired. Please log in again.';
    errorEl.classList.add('show');
  }
})();

async function parseJsonResponse(res) {
  const text = await res.text();
  if (!text) return {};
  try {
    return JSON.parse(text);
  } catch {
    throw new Error(res.ok ? 'Invalid server response' : `Server error (${res.status})`);
  }
}

const API_BASE = window.location.origin.includes('localhost')
  ? window.location.origin
  : 'https://attendance-production-fb0b.up.railway.app';

async function handleLogin(e) {
  e.preventDefault();
  const fullId = document.getElementById('fullId').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');

  errorEl.classList.remove('show');
  errorEl.textContent = '';

  if (!fullId) {
    errorEl.textContent = 'Please enter your Full ID';
    errorEl.classList.add('show');
    return;
  }
  if (fullId.indexOf('-') === -1) {
    errorEl.textContent = 'Invalid ID format. Your ID should look like HARV-T001';
    errorEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const res = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_id: fullId, password: password })
    });
    const data = await parseJsonResponse(res);

    if (!res.ok) {
      errorEl.textContent = data.error || 'Login failed. Please try again.';
      errorEl.classList.add('show');
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      return;
    }

    if (data.is_first_login) {
      window.location.href = '/change-password.html';
    } else {
      window.location.href = data.redirect_url || '/';
    }
  } catch (err) {
    errorEl.textContent = err.message || 'Connection error. Please check your internet and try again.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btnText.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
