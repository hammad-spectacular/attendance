<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — The Eye</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
[data-theme="dark"] {
  --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
  --text: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
  --primary: #4f46e5; --primary-light: #818cf8;
  --success: #22c55e; --danger: #ef4444;
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.4);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
  --success-bg: rgba(34,197,94,0.1);
  --warning-bg: rgba(245,158,11,0.1);
}
[data-theme="light"] {
  --bg: #f1f5f9; --bg-card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --primary: #4f46e5; --primary-light: #6366f1;
  --success: #16a34a; --danger: #dc2626;
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
  --gradient: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
  --success-bg: rgba(34,197,94,0.08);
  --warning-bg: rgba(245,158,11,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.4s ease;
}
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px 36px;
  width: 90%; max-width: 420px;
  box-shadow: var(--shadow-lg); animation: fadeInUp 0.5s ease-out;
}
.header { text-align: center; margin-bottom: 28px; }
.header .icon {
  width: 56px; height: 56px;
  background: var(--gradient); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px; font-size: 1.5rem; color: white;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
}
.header h1 { font-size: 1.3rem; font-weight: 800; }
.header p { font-size: 0.82rem; color: var(--text-secondary); margin-top: 4px; }
.notice {
  background: var(--warning-bg);
  border: 1px solid rgba(245,158,11,0.2);
  color: #f59e0b;
  padding: 10px 14px; border-radius: 10px;
  font-size: 0.8rem; font-weight: 500; margin-bottom: 20px;
  text-align: center;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-secondary); margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 12px 14px;
  border-radius: 10px; border: 2px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  outline: none; transition: border-color 0.25s ease;
}
.form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
.btn {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  background: var(--gradient); color: white;
  font-family: 'Inter', sans-serif; font-size: 0.9rem;
  font-weight: 700; cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 12px rgba(79,70,229,0.3);
  margin-top: 4px;
}
.btn:hover { box-shadow: 0 6px 18px rgba(79,70,229,0.45); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.msg {
  padding: 10px 14px; border-radius: 10px;
  font-size: 0.8rem; font-weight: 500; margin-top: 12px;
  display: none;
}
.msg.show { display: block; }
.msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--danger); }
.msg.success { background: var(--success-bg); border: 1px solid rgba(34,197,94,0.2); color: var(--success); }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width:480px) { .card { padding: 28px 20px; } }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon"><i class="fas fa-key"></i></div>
    <h1>Set Your Password</h1>
    <p>You must set a new password before continuing</p>
  </div>

  <div class="notice">
    <i class="fas fa-info-circle"></i> Welcome! Please create a new password to secure your account.
  </div>

  <form id="passwordForm" onsubmit="handleChangePassword(event)">
    <div class="form-group" id="currentPasswordGroup">
      <label for="currentPassword">Current Password</label>
      <input type="password" id="currentPassword" placeholder="Enter your temporary password" required>
    </div>
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6">
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter new password" required>
    </div>

    <div class="msg" id="passwordMsg"></div>

    <button type="submit" class="btn" id="submitBtn">
      <span id="btnText">Change Password</span>
    </button>
  </form>
</div>

<script>
function authHeader() {
  const token = localStorage.getItem('auth_token');
  return token ? { 'Authorization': 'Bearer ' + token } : {};
}

let redirectAfter = '/';

async function handleChangePassword(e) {
  e.preventDefault();
  const current = document.getElementById('currentPassword').value;
  const newPw = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const msgEl = document.getElementById('passwordMsg');
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');

  msgEl.classList.remove('show', 'error', 'success');

  if (newPw !== confirm) {
    msgEl.textContent = 'New passwords do not match';
    msgEl.className = 'msg error show';
    return;
  }
  if (newPw.length < 6) {
    msgEl.textContent = 'Password must be at least 6 characters';
    msgEl.className = 'msg error show';
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Saving...';

  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeader() },
      body: JSON.stringify({ current_password: current, new_password: newPw, confirm_password: confirm })
    });
    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = data.error || 'Failed to change password';
      msgEl.className = 'msg error show';
      btn.disabled = false;
      btnText.textContent = 'Change Password';
      return;
    }

    if (data.token) localStorage.setItem('auth_token', data.token);
    msgEl.textContent = 'Password changed successfully! Redirecting...';
    msgEl.className = 'msg success show';

    setTimeout(() => {
      window.location.href = redirectAfter;
    }, 800);
  } catch (err) {
    msgEl.textContent = 'Connection error. Please try again.';
    msgEl.className = 'msg error show';
    btn.disabled = false;
    btnText.textContent = 'Change Password';
  }
}

async function checkSession() {
  const token = localStorage.getItem('auth_token');
  if (!token) { window.location.href = '/index.html'; return; }
  try {
    const res = await fetch('/api/auth/me', { headers: authHeader() });
    const data = await res.json();
    if (res.ok) {
      const redirectMap = { super_admin: '/super-admin.html', admin: '/admin.html', teacher: '/teacher.html', student: '/student.html' };
      redirectAfter = redirectMap[data.role] || '/';
      if (data.is_first_login) {
        document.getElementById('currentPasswordGroup').style.display = 'none';
        document.getElementById('currentPassword').required = false;
      } else {
        window.location.href = redirectAfter;
      }
    } else {
      localStorage.removeItem('auth_token');
      window.location.href = '/index.html';
    }
  } catch (e) {
    window.location.href = '/index.html';
  }
}
checkSession();
</script>
</body>
</html>
